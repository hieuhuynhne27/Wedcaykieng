<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Giỏ hàng</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <!-- HÀNG TRÊN -->
    <div class="left-header">

        <h1>🌿 Green Life</h1>

        <div class="center-header">

            <div class="item">
                <b> Thanh toán tại nhà</b><br>
                <span>Khu vực Hồ Chí Minh</span>
            </div>

            <div class="item">
                <b> Hotline: 0908.573.508</b><br>
                <span>Tư vấn 24/7 miễn phí</span>
            </div>

            <div class="item">
                <b>🚛 Giao hàng toàn quốc</b><br>
                <span>Ship COD tận nhà</span>
            </div>

        </div>

        <!-- ĐĂNG NHẬP -->
        <div class="right-header">

            <div class="user">

                👤 Đăng nhập

                <div class="login-dropdown">

                    <input type="text"
                    placeholder="Tên đăng nhập">

                    <input type="password"
                    placeholder="Mật khẩu">

                    <button>Đăng nhập</button>

                    <a href="#">Quên mật khẩu?</a>

                    <a href="#">Đăng ký</a>

                </div>

            </div>

            <!-- GIỎ HÀNG -->
            <div class="cart">

                <div class="cart-icon">

                    🛒 Giỏ hàng

                    <span id="cart-count">0</span>

                </div>

            </div>

        </div>

    </div>

    <!-- HÀNG DƯỚI -->
    <div class="menu-search">

        <nav>

            <a href="index.html">Trang chủ</a>

            <a href="products.html">
                Sản phẩm ▼
            </a>

            <a href="about.html">
                Giới thiệu
            </a>

            <a href="contact.html">
                Liên hệ
            </a>
                    <a href="labs.html">

                    Lab thực hành

                </a>

        </nav>

        <div class="search">

            <input type="text"
            id="searchInput"
            placeholder="Bạn muốn tìm gì?">

            <button>

                Tìm kiếm

            </button>

        </div>

    </div>

</header>

<!-- ================= CART ================= -->

<div class="cart-container">

    <h1 class="cart-title">

        🛒 Giỏ hàng của bạn

    </h1>

    <div id="cart-list"></div>

    <div class="cart-total-page">

        Tổng:
        <span id="total">0đ</span>

    </div>

    <div class="cart-actions">

        <button
        onclick="window.location.href='index.html'">

            ← Tiếp tục mua

        </button>

<button onclick="window.location.href='checkout.html'">
    Thanh toán
</button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
